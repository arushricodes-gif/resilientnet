name: resilientnet
description: Resilient logistics and dynamic supply chain optimization
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  intl: ^0.19.0
  http: ^1.6.0

  # Firebase — real-time Firestore listeners + FCM push notifications
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
